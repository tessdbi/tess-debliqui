<body>

    <nav>
       <div class="logo">
          <a href="index.html">
            <img src="images/logo3.png" alt="logotess" class="logotess">

    <main class="projects-page">
    <h1 class="projects-title">SÉLECTION DE TRAVAUX</h1>

    <section class="projects-grid">
        <article class="project-card" data-title="01. Identité Visuelle" data-desc="Description détaillée du projet 1 : Ici vous pouvez expliquer votre démarche créative, les outils utilisés (Photoshop, Figma) et le résultat final." data-img="projet1.jpg">
            <div class="project-image shape-1">
                <img src="projet1.jpg" alt="Projet 1">
            </div>
            <div class="project-info">
                <h3>01. Identité Visuelle</h3>
            </div>
        </article>

        <article class="project-card" data-title="02. Photographie" data-desc="Description détaillée du projet 2 : Parlez ici de la lumière, de la composition et de ce que vous avez voulu transmettre à travers ces clichés." data-img="projet2.jpg">
            <div class="project-image shape-2">
                <img src="projet2.jpg" alt="Projet 2">
            </div>
            <div class="project-info">
                <h3>02. Photographie</h3>
            </div>
        </article>

        <article class="project-card" data-title="03. Web Design" data-desc="Description détaillée du projet 3 : Expliquez comment vous avez pensé l'expérience utilisateur (UX) et le choix des couleurs pour ce site web." data-img="projet3.jpg">
            <div class="project-image shape-3">
                <img src="projet3.jpg" alt="Projet 3">
            </div>
            <div class="project-info">
                <h3>03. Web Design</h3>
            </div>
        </article>
    </section>
</main>

<div id="projectModal" class="modal">
    <span class="close-modal">&times;</span>
    <div class="modal-content">
        <div class="modal-body">
            <img id="modalImg" src="" alt="Projet Zoom">
            <div class="modal-text">
                <h2 id="modalTitle">Titre du projet</h2>
                <p id="modalDesc">Description détaillée...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById("projectModal");
    const cards = document.querySelectorAll(".project-card");
    const closeBtn = document.querySelector(".close-modal");

    cards.forEach(card => {
        card.onclick = function() {
            modal.style.display = "flex";
            document.getElementById("modalImg").src = this.getAttribute("data-img");
            document.getElementById("modalTitle").innerText = this.getAttribute("data-title");
            document.getElementById("modalDesc").innerText = this.getAttribute("data-desc");
        }
    });

    closeBtn.onclick = function() {
        modal.style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
