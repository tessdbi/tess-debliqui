<body>

       <div class="logo">
          <a href="index.html">
            <img src="images/logo3.png" alt="logotess" class="logotess">

    <main class="travel-contact-wrapper">
    <div class="decor-layer">
        <div class="flight-line line-1"></div>
        <div class="flight-line line-2"></div>
        <div class="passport-stamp stamp-1">TESS DEBLIQUI</div>
        <div class="passport-stamp stamp-2">PORTFOLIO</div>
    </div>

    <section class="postcard-container">
        <div class="postcard-inner">
            <div class="postcard-left">
                <h1>Contactez-moi</h1>
                <p>Prête pour l'embarquement ? Laissez-moi un message si vous avez des questions.</p>
                
                <form action="#" class="postcard-form">
                    <input type="text" placeholder="Votre nom" required>
                    <input type="email" placeholder="Votre email" required>
                    <textarea placeholder="Votre message..." rows="4" required></textarea>
                    <button type="submit">Envoyer le message ↗</button>
                </form>
            </div>

            <div class="postcard-right">
                <div class="stamp-box">
                    <img src="images/tess.JPG" alt="Stamp" class="logo-stamp">
                </div>
                <div class="address-lines">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                    <p class="destination">Destination : Portfolio </p>
                </div>
            </div>
        </div>
    </section>


</main>
